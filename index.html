<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --bg:      #0a0f1e;
    --surface: #111827;
    --surf2:   #1a2236;
    --bd:      rgba(255,255,255,0.08);
    --bd2:     rgba(255,255,255,0.14);
    --text:    #f0f4ff;
    --muted:   #8494b4;
    --accent:  #3b7ff5;
    --fr-bg:   #1a3a6e;
    --fr-bd:   #3b7ff5;
    --nx-bg:   rgba(240,192,64,0.07);
    --nx-bd:   #f0c040;
    --lv-bg:   rgba(239,68,68,0.08);
    --lv-bd:   #ef4444;
    --lv-c:    #ef4444;
    --gold:    #f0c040;
    --m6-bg:   rgba(59,127,245,0.15);
    --m6-tx:   #7bb3ff;
    --bn-bg:   rgba(132,148,180,0.12);
    --bn-tx:   #8494b4;
    --r:       8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--bd);
    padding: 2rem 1rem 1.5rem;
    text-align: center;
    background: linear-gradient(180deg, #0d1528, var(--bg));
  }
  .eyebrow { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  h1       { font-size: clamp(20px, 4vw, 34px); font-weight: 700; letter-spacing: -.02em; margin-bottom: 6px; }
  .sub     { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }
  .stats   { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; }
  .stat-n  { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-l  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

  /* ── Status bar ── */
  #sbar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 7px 1rem;
    font-size: 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--bd);
  }
  #jumpbtn {
    display: none;
    background: none;
    border: 1px solid var(--bd2);
    color: var(--muted);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
  }
  #jumpbtn:hover    { border-color: var(--accent); color: var(--text); }
  .slive-active { color: var(--lv-c); font-weight: 600; }
  #jumpbtn.is-live  { color: var(--lv-c); border-color: var(--lv-bd); }

  /* ── Layout ── */
  main { max-width: 840px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* ── Legend ── */
  .legend      { display: flex; gap: 1.2rem; flex-wrap: wrap; margin-bottom: 1.5rem; font-size: 12px; color: var(--muted); align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot  { width: 8px; height: 8px; border-radius: 50%; }

  /* ── Day groups ── */
  .day-group { margin-bottom: 1.75rem; }
  .day-label {
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--bd);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .phase-title {
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 2rem 0 .75rem;
    font-weight: 700;
  }

  /* ── Match rows ── */
  .row {
    display: grid;
    grid-template-columns: 58px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: var(--r);
    margin-bottom: 4px;
    border: 1px solid var(--bd);
    background: var(--surface);
    transition: border-color .15s, background .15s;
  }
  .row:hover    { border-color: var(--bd2); background: var(--surf2); }
  .row.fr       { border-color: var(--fr-bd); background: var(--fr-bg); }
  .row.fr:hover { background: #1e4080; }
  .row.nx       { border-color: var(--nx-bd); background: var(--nx-bg); }
  .row.lv       { border-color: var(--lv-bd); background: var(--lv-bg); }
  .row.fn       { border-color: var(--gold);  background: rgba(240,192,64,0.05); }

  .time-col    { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
  .time        { font-size: 13px; color: var(--muted); font-weight: 600; white-space: nowrap; }
  .badge-live  { font-size: 10px; font-weight: 700; color: var(--lv-c); letter-spacing: .04em; }
  .badge-next  { font-size: 10px; font-weight: 700; color: var(--gold); }

  .match-info  { min-width: 0; }
  .teams       { font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .row.fr .teams { color: #c8d8ff; }
  .sep         { color: var(--muted); }
  .group       { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .note        { font-size: 11px; color: var(--m6-tx); }

  /* Flag icons — sizing uniquement dans les lignes de match */
  .teams .fi { font-size: 1.1em; vertical-align: -0.1em; border-radius: 2px; }

  /* Channel badges */
  .badge      { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .badge-m6   { background: var(--m6-bg); color: var(--m6-tx); }
  .badge-bein { background: var(--bn-bg); color: var(--bn-tx); }
  .badge-fin  { background: rgba(240,192,64,.15); color: var(--gold); }

  .score-ft { font-size: 13px; font-weight: 700; color: var(--muted); background: rgba(255,255,255,0.06); padding: 1px 6px; border-radius: 4px; }

  /* ── Standings ── */
  #stoggle {
    width: 100%; text-align: left;
    padding: 9px 14px; margin-bottom: 1rem;
    background: var(--surface); border: 1px solid var(--bd2); border-radius: var(--r);
    color: var(--muted); font-size: 13px; font-family: inherit; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: border-color .15s, color .15s;
  }
  #stoggle:hover { border-color: var(--accent); color: var(--text); }
  #stoggle .sarrow { display: inline-block; transition: transform .2s; font-style: normal; }
  #stoggle.open .sarrow { transform: rotate(90deg); }

  #standings { display: none; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  #standings.open { display: grid; }

  .gtable { background: var(--surface); border: 1px solid var(--bd); border-radius: var(--r); overflow: hidden; }
  .gtable-head {
    background: var(--surf2); padding: 6px 10px;
    font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
    color: var(--accent); border-bottom: 1px solid var(--bd);
  }
  .gtable table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .gtable th { color: var(--muted); font-weight: 600; padding: 4px 5px; text-align: right; font-size: 11px; }
  .gtable th:first-child { text-align: left; padding-left: 8px; }
  .gtable td { padding: 5px 5px; text-align: right; border-top: 1px solid var(--bd); }
  .gtable td:first-child { text-align: left; padding-left: 8px; }
  .gtable tr.st-q1 { background: rgba(59,127,245,0.10); }
  .gtable tr.st-q3ok { background: rgba(240,192,64,0.15); }
  .gtable tr.st-q3no { opacity: .55; }
  .gt-q-dot3 { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; opacity: .8; }
  .gtable tr.st-fr { background: var(--fr-bg); }
  .gt-team { display: flex; align-items: center; gap: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gt-team .fi { font-size: 1em; border-radius: 2px; flex-shrink: 0; }
  .gt-pts { font-weight: 700; color: var(--text); }
  .gt-gd-pos { color: #4ade80; }
  .gt-gd-neg { color: var(--lv-c); }
  .gt-q-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; opacity: .7; }

  .empty  { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }
  footer  { text-align: center; padding: 1.5rem; font-size: 12px; color: var(--muted); border-top: 1px solid var(--bd); }

  @media (max-width: 500px) {
    .row   { grid-template-columns: 46px 1fr auto; gap: 8px; padding: 9px 10px; }
    .teams { font-size: 13px; }
    #standings { grid-template-columns: 1fr; }
  }
</style>
</head>

// ── Drapeaux ────────────────────────────────────────────────────────────────
// Codes ISO 3166-1 alpha-2 pour flag-icons (lipis) via jsDelivr
// gb-eng et gb-sct sont des codes de subdivision supportés par flag-icons
const FLAG = {
  'Afrique du Sud':'za',    'Algérie':'dz',           'Allemagne':'de',
  'Angleterre':'gb-eng',    'Arabie saoudite':'sa',    'Argentine':'ar',
  'Australie':'au',         'Autriche':'at',           'Belgique':'be',
  'Bosnie-Herzégovine':'ba','Brésil':'br',             'Canada':'ca',
  'Cap-Vert':'cv',          'Colombie':'co',           'Corée du Sud':'kr',
  'Croatie':'hr',           'Curaçao':'cw',            "Côte d'Ivoire":'ci',
  'Espagne':'es',           'France':'fr',             'Ghana':'gh',
  'Haïti':'ht',             'Irak':'iq',               'Iran':'ir',
  'Japon':'jp',             'Jordanie':'jo',           'Maroc':'ma',
  'Mexique':'mx',           'Norvège':'no',            'Nouvelle-Zélande':'nz',
  'Ouzbékistan':'uz',       'Panama':'pa',             'Paraguay':'py',
  'Pays-Bas':'nl',          'Portugal':'pt',           'Qatar':'qa',
  'RD Congo':'cd',          'Rép. tchèque':'cz',       'Suisse':'ch',
  'Suède':'se',             'Sénégal':'sn',            'Tunisie':'tn',
  'Turquie':'tr',           'Uruguay':'uy',            'Écosse':'gb-sct',
  'Égypte':'eg',            'Équateur':'ec',           'États-Unis':'us',
};

function teamHtml(name) {
  const code = FLAG[name];
  const flag = code ? `<span class="fi fi-${code}"></span>` : '';
  return `${flag}${name}`;
}

// "Équipe A - Équipe B" → HTML avec drapeaux et séparateur stylé
// Ne splitte que sur " - " (espace-tiret-espace) pour éviter les faux positifs
// sur les noms composés (RD Congo, Cap-Vert…)
function matchHtml(str) {
  const [a, b] = str.split(' - ');
  if (!b) return str; // placeholder KO sans séparateur
  return `${teamHtml(a)} <span class="sep">-</span> ${teamHtml(b)}`;
}

// ── Constantes ─────────────────────────────────────────────────────────────
const DUR_GROUP  = 115 * 60 * 1000;
const DUR_KO     = 160 * 60 * 1000;
const DAYS       = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MONTHS     = ['jan.','fév.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
const KO_PHASES  = ['16e','8e','Quart','Demi','Petite','Finale'];
const ESPN_URL   = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=200&dates=20260611-20260719';

// ── State ──────────────────────────────────────────────────────────────────
let scoreMap     = {}; // utcKey → { hs, as, st:'live'|'ht'|'ft'|'sched', min }
let scoreMapArr  = {}; // utcKey → ordered array (handles simultaneous matches)

// ── ESPN ───────────────────────────────────────────────────────────────────
function utcKey(utc) { return utc.slice(0, 16) + 'Z'; }

async function fetchScores() {
  try {
    const r = await fetch(ESPN_URL);
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    scoreMap = {};
    const newArr = {};
    (data.events || []).forEach(ev => {
      const comp = ev.competitions?.[0];
      if (!comp) return;
      const sn   = comp.status?.type?.name || '';
      const isLv = sn === 'STATUS_IN_PROGRESS';
      const isHT = sn === 'STATUS_HALFTIME';
      const isFT = sn === 'STATUS_FULL_TIME' || sn === 'STATUS_FINAL';
      const home = comp.competitors?.find(c => c.homeAway === 'home');
      const away = comp.competitors?.find(c => c.homeAway === 'away');
      const entry = {
        hs: home?.score ?? null,
        as: away?.score ?? null,
        st: isLv ? 'live' : isHT ? 'ht' : isFT ? 'ft' : 'sched',
        min: isHT ? 'MT' : (comp.status?.displayClock || ''),
      };
      const key = utcKey(ev.date);
      scoreMap[key] = entry;
      if (!newArr[key]) newArr[key] = [];
      newArr[key].push(entry);
    });
    scoreMapArr = newArr;
    // Mettre à jour les noms d'équipes KO dès qu'ESPN les connaît
    MATCHES.forEach(m => {
      if (m.ph !== 'ko') return;
      const s = scoreMap[utcKey(m.utc)];
      if (!s) return;
      const home = (data.events || []).find(ev => utcKey(ev.date) === utcKey(m.utc))
        ?.competitions?.[0]?.competitors;
      if (!home) return;
      const hn = home.find(c => c.homeAway === 'home')?.team?.shortDisplayName;
      const an = home.find(c => c.homeAway === 'away')?.team?.shortDisplayName;
      if (hn && an) m.m = `${hn} - ${an}`;
    });
    return true;
  } catch {
    return false;
  }
}

// ── Classements ────────────────────────────────────────────────────────────
function computeStandings() {
  const groups = {};
  const bucketIdx = {};
  MATCHES.forEach(m => {
    if (m.ph === 'ko') return;
    const parts = m.m.split(' - ');
    if (parts.length < 2) return;
    const [ta, tb] = parts;
    if (!groups[m.g]) groups[m.g] = {};
    const g = groups[m.g];
    if (!g[ta]) g[ta] = { w:0, d:0, l:0, gf:0, ga:0, played:0 };
    if (!g[tb]) g[tb] = { w:0, d:0, l:0, gf:0, ga:0, played:0 };
    const key = utcKey(m.utc);
    if (bucketIdx[key] === undefined) bucketIdx[key] = 0;
    const idx = bucketIdx[key]++;
    const arr = scoreMapArr[key];
    const s   = (arr && arr[idx] !== undefined) ? arr[idx] : scoreMap[key];
    if (!s || s.st !== 'ft' || s.hs === null) return;
    const hs = +s.hs, as = +s.as;
    g[ta].played++; g[tb].played++;
    g[ta].gf += hs;  g[ta].ga += as;
    g[tb].gf += as;  g[tb].ga += hs;
    if      (hs > as) { g[ta].w++; g[tb].l++; }
    else if (as > hs) { g[tb].w++; g[ta].l++; }
    else              { g[ta].d++; g[tb].d++; }
  });
  return groups;
}

function renderStandings() {
  const container = document.getElementById('standings');
  if (!container.classList.contains('open')) return;
  const groups = computeStandings();
  // Preserve group order from MATCHES
  const seen = new Set();
  const groupOrder = [];
  MATCHES.forEach(m => { if (!m.ph && !seen.has(m.g)) { seen.add(m.g); groupOrder.push(m.g); } });
  let html = '';
  // Collect all 3rd-place teams to determine best 8
  const sortFn = (a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.name.localeCompare(b.name);
  const rowsByGroup = {};
  groupOrder.forEach(gname => {
    const teams = groups[gname] || {};
    rowsByGroup[gname] = Object.entries(teams)
      .map(([name, s]) => ({
        name, played: s.played, w: s.w, d: s.d, l: s.l,
        gf: s.gf, ga: s.ga, gd: s.gf - s.ga, pts: s.w * 3 + s.d,
      }))
      .sort(sortFn);
  });
  const thirds = [];
  groupOrder.forEach(gname => {
    const rows = rowsByGroup[gname];
    if (rows.length >= 3) thirds.push({ ...rows[2], group: gname });
  });
  thirds.sort(sortFn);
  const qualifiedThirds = new Set(thirds.slice(0, 8).map(t => t.name));
  const anyResults = thirds.some(t => t.played > 0);

  groupOrder.forEach(gname => {
    const rows = rowsByGroup[gname];
    html += `<div class="gtable"><div class="gtable-head">${gname}</div>
      <table><thead><tr>
        <th>Équipe</th><th title="Joués">J</th><th title="Victoires">V</th>
        <th title="Nuls">N</th><th title="Défaites">D</th>
        <th title="Différence de buts">+/-</th><th title="Points">Pts</th>
      </tr></thead><tbody>`;
    rows.forEach((r, i) => {
      const isFr   = r.name === 'France';
      const is3rd  = i === 2;
      const is3rdQ = is3rd && anyResults && qualifiedThirds.has(r.name);
      const is3rdX = is3rd && anyResults && !qualifiedThirds.has(r.name);
      const cls    = isFr ? 'st-fr' : i < 2 ? 'st-q1' : is3rdQ ? 'st-q3ok' : is3rdX ? 'st-q3no' : '';
      const gdVal  = r.gd > 0 ? `<span class="gt-gd-pos">+${r.gd}</span>`
                   : r.gd < 0 ? `<span class="gt-gd-neg">${r.gd}</span>`
                   : '0';
      const qdot   = i < 2 ? '<span class="gt-q-dot"></span>'
                   : is3rdQ ? '<span class="gt-q-dot3"></span>' : '';
      html += `<tr class="${cls}"><td><div class="gt-team">${qdot}${teamHtml(r.name)}</div></td>
        <td>${r.played}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
        <td>${gdVal}</td><td class="gt-pts">${r.pts}</td></tr>`;
    });
    html += `</tbody></table></div>`;
  });
  container.innerHTML = html || '<p class="empty">Aucune donnée disponible.</p>';
}

// ── Logique temporelle ─────────────────────────────────────────────────────
// Priorité : données ESPN si disponibles, sinon détection locale par horloge
function matchState(m) {
  const s = scoreMap[utcKey(m.utc)];
  if (s && s.st !== 'sched') return s.st;
  // Fallback local
  const now = Date.now();
  const ko  = new Date(m.utc).getTime();
  const dur = m.ph === 'ko' ? DUR_KO : DUR_GROUP;
  if (now >= ko && now < ko + dur) return 'live';
  if (now >= ko + dur)             return 'ft';
  return 'sched';
}

function liveLabel(m) {
  const s = scoreMap[utcKey(m.utc)];
  // Score ESPN disponible
  if (s && (s.st === 'live' || s.st === 'ht')) {
    const score = s.hs !== null ? ` ${s.hs}-${s.as}` : '';
    const half  = s.st === 'ht' ? 'Mi-temps' : (s.min || '');
    return `${half}${score}`.trim();
  }
  // Fallback : mi-temps locale
  const elapsed = Math.floor((Date.now() - new Date(m.utc).getTime()) / 60000);
  if (elapsed >= 46 && elapsed <= 60) return 'Mi-temps';
  return elapsed <= 45 ? '1ère mi-temps' : '2ème mi-temps';
}

function scoreLabel(m) {
  const s = scoreMap[utcKey(m.utc)];
  if (!s || s.hs === null) return '';
  if (s.st === 'ft')  return `${s.hs}-${s.as}`;
  return '';
}

function nextMatchUtc() {
  const now = Date.now();
  const future = MATCHES
    .filter(x => new Date(x.utc).getTime() > now)
    .sort((a, b) => new Date(a.utc) - new Date(b.utc));
  return future.length ? future[0].utc : null;
}

function dayLabel(utc) {
  const d = new Date(new Date(utc).toLocaleString('en-US', { timeZone: 'Europe/Paris' }));
  return `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

// ── Rendu ──────────────────────────────────────────────────────────────────
function rowClass(st, m, next) {
  if (st === 'live' || st === 'ht') return 'row lv';
  if (m.fr)           return 'row fr';
  if (m.utc === next) return 'row nx';
  if (m.final)        return 'row fn';
  return 'row';
}

function timeCell(st, m, next) {
  const isLive = st === 'live' || st === 'ht';
  const isNext = !isLive && m.utc === next;
  const sub = isLive
    ? `<span class="badge-live">⬤ ${liveLabel(m)}</span>`
    : isNext ? `<span class="badge-next">▶ SUIVANT</span>` : '';
  return `<div class="time-col"><span class="time">${m.t}</span>${sub}</div>`;
}

function channelBadge(m) {
  if (m.final)       return '<span class="badge badge-fin">M6 — FINALE</span>';
  if (m.tv === 'm6') return '<span class="badge badge-m6">M6</span>';
  return '<span class="badge badge-bein">beIN</span>';
}

function render() {
  const cal  = document.getElementById('cal');
  const next = nextMatchUtc();
  const list = MATCHES;

  if (!list.length) { cal.innerHTML = '<p class="empty">Aucun match.</p>'; return; }

  const byDay = new Map();
  list.forEach(x => {
    const label = dayLabel(x.utc);
    if (!byDay.has(label)) byDay.set(label, []);
    byDay.get(label).push(x);
  });

  let html = '', lastPhase = '';
  for (const [label, matches] of byDay) {
    if (matches[0].ph === 'ko') {
      const phase  = matches[0].g;
      const phKey  = KO_PHASES.find(p => phase.startsWith(p));
      if (phKey && phKey !== lastPhase) {
        html += `<div class="phase-title">${phase}</div>`;
        lastPhase = phKey;
      }
    }
    html += `<div class="day-group"><div class="day-label">${label}</div>`;
    matches.forEach(x => {
      const st    = matchState(x);
      const note  = x.note ? `<span class="note">(${x.note})</span>` : '';
      const score = scoreLabel(x);
      const sc    = score ? ` <span class="score-ft">${score}</span>` : '';
      html += `<div class="${rowClass(st, x, next)}" data-utc="${x.utc}">
        ${timeCell(st, x, next)}
        <div class="match-info">
          <div class="teams">${matchHtml(x.m)}${sc}${note}</div>
          <div class="group">${x.g}</div>
        </div>
        ${channelBadge(x)}
      </div>`;
    });
    html += '</div>';
  }

  cal.innerHTML = html;
  updateStatusBar(next);
}

// ── Barre de statut ────────────────────────────────────────────────────────
function updateStatusBar(next) {
  const hm   = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  const live = MATCHES.filter(x => matchState(x) === 'live');
  const jb   = document.getElementById('jumpbtn');
  const sl   = document.getElementById('slive');

  document.getElementById('stime').textContent = hm;

  if (live.length) {
    sl.innerHTML = `<span class="slive-active">⬤ ${live.length} match${live.length > 1 ? 's' : ''} en cours</span>`;
    jb.textContent   = live.length > 1 ? '↓ Matchs en cours' : '↓ Match en cours';
    jb.className     = 'is-live';
    jb.style.display = 'inline-block';
  } else if (next) {
    const nxt = MATCHES.find(x => x.utc === next);
    sl.innerHTML     = `Prochain : ${matchHtml(nxt.m)} à ${nxt.t}`;
    jb.textContent   = '↓ Prochain match';
    jb.className     = '';
    jb.style.display = 'inline-block';
  } else {
    sl.textContent   = 'Tournoi terminé';
    jb.style.display = 'none';
  }
}

// ── Jump vers le match actif ───────────────────────────────────────────────
function jumpToActive() {
  const next   = nextMatchUtc();
  const target = MATCHES.find(x => matchState(x) === 'live') || MATCHES.find(x => x.utc === next);
  if (!target) return;

  if (!document.querySelector(`[data-utc="${target.utc}"]`)) {
    render();
  }

  setTimeout(() => {
    const el = document.querySelector(`[data-utc="${target.utc}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

// ── Init ───────────────────────────────────────────────────────────────────
async function refresh() {
  await fetchScores();
  render();
  renderStandings();
  // Refresh plus fréquent si match(s) en cours
  const hasLive = MATCHES.some(x => { const s = scoreMap[utcKey(x.utc)]; return s && (s.st === 'live' || s.st === 'ht'); });
  setTimeout(refresh, hasLive ? 30000 : 120000);
}

document.getElementById('stoggle').addEventListener('click', () => {
  document.getElementById('stoggle').classList.toggle('open');
  document.getElementById('standings').classList.toggle('open');
  renderStandings();
});

render(); // Affichage immédiat avec détection locale
refresh();            // Puis fetch ESPN + refresh planifié
</script>
