<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupe du Monde 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css">
<style>
  :root {
    --bg:      #0c1810;
    --surface: #122016;
    --surf2:   #1a2e1e;
    --bd:      rgba(255,255,255,0.06);
    --bd2:     rgba(255,255,255,0.11);
    --text:    #ecfdf5;
    --muted:   #4d7a55;
    --accent:  #4ade80;
    --fr-bg:   rgba(0,35,149,0.20);
    --fr-bd:   #002395;
    --nx-bg:   rgba(251,191,36,0.07);
    --nx-bd:   #fbbf24;
    --lv-bg:   rgba(248,113,113,0.07);
    --lv-bd:   #f87171;
    --lv-c:    #f87171;
    --gold:    #fbbf24;
    --m6-bg:   rgba(74,222,128,0.12);
    --m6-tx:   #86efac;
    --r:       8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── Layout 2 colonnes ── */
  .app {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Colonne gauche : classements ── */
  .sidebar {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--bd);
    overflow: hidden;
    background: var(--surface);
  }

  .sidebar-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 10px 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--bd2) transparent;
  }

  .sidebar-body::-webkit-scrollbar { width: 4px; }
  .sidebar-body::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 2px; }

  /* ── Colonne droite : matches ── */
  .main-col {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .matches-body {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem 1.25rem 4rem;
    scrollbar-width: thin;
    scrollbar-color: var(--bd2) transparent;
  }

  .matches-body::-webkit-scrollbar { width: 4px; }
  .matches-body::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 2px; }

  /* ── App header (pleine largeur) ── */
  .app-header {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 0.8rem 1.5rem;
    border-bottom: 1px solid var(--bd);
    background: linear-gradient(180deg, #091410 0%, var(--surface) 100%);
  }
  .eyebrow { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
  h1       { font-size: 22px; font-weight: 700; letter-spacing: -.02em; }

  /* ── Focus card (dans le header) ── */
  #fcard-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .fcard-meta { display: flex; align-items: center; gap: 8px; }
  #stime-wrap { font-size: 13px; color: var(--muted); white-space: nowrap; }
  #fcard-date {
    display: none;
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
    text-transform: capitalize;
  }
  #fcard {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--surf2);
    border: 1px solid var(--bd2);
    border-radius: var(--r);
    padding: 6px 12px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    font-size: 13px;
    color: var(--text);
    line-height: 1;
  }
  #fcard:hover { border-color: var(--accent); background: #162a1a; }
  #fcard.is-live { border-color: var(--lv-bd); }
  #fcard.is-live:hover { border-color: var(--lv-c); }
  #fcard.is-fr  { border-color: var(--fr-bd); }
  .fc-left   { display: flex; flex-direction: column; gap: 3px; align-items: center; border-right: 1px solid var(--bd2); padding-right: 12px; }
  .fc-status { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .fc-timer  { font-size: 13px; font-weight: 700; color: var(--muted); }
  #fcard.is-live .fc-status { color: var(--lv-c); }
  #fcard.is-live .fc-timer  { color: var(--lv-c); }
  .fc-teams { font-weight: 600; display: flex; align-items: center; gap: 10px; font-size: 17px; }
  .fc-teams .fi { font-size: 1.3em; border-radius: 3px; }
  .fc-teams .score-mid { font-size: 15px; padding: 2px 9px; }

  /* ── Légende ── */
  .legend      { display: flex; gap: 1.2rem; flex-wrap: wrap; margin-bottom: 1.25rem; font-size: 12px; color: var(--muted); align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot  { width: 8px; height: 8px; border-radius: 50%; }

  /* ── Day groups ── */
  .day-group { margin-bottom: 1.5rem; }
  .day-label {
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 7px;
    border-bottom: 1px solid var(--bd);
    margin-bottom: 7px;
    font-weight: 600;
  }
  .phase-title {
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 2rem 0 .75rem;
    font-weight: 700;
  }

  /* ── Match rows ── */
  .row {
    display: grid;
    grid-template-columns: 52px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--r);
    margin-bottom: 4px;
    border: 1px solid var(--bd);
    background: var(--surface);
    transition: border-color .15s, background .15s;
  }
  .row:hover    { border-color: var(--bd2); background: var(--surf2); }
  .row.fr       { border-color: var(--fr-bd); background: var(--fr-bg); }
  .row.fr:hover { background: rgba(0,35,149,0.28); }
  .row.nx       { border-color: var(--nx-bd); background: var(--nx-bg); }
  .row.lv       { border-color: var(--lv-bd); background: var(--lv-bg); }
  .row.fn       { border-color: var(--gold);  background: rgba(240,192,64,0.05); }

  .time-col    { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
  .time        { font-size: 13px; color: var(--muted); font-weight: 600; white-space: nowrap; }
  .badge-live  { font-size: 10px; font-weight: 700; color: var(--lv-c); letter-spacing: .04em; }
  .badge-next  { font-size: 10px; font-weight: 700; color: var(--gold); }

  .match-info  { min-width: 0; }
  .teams       { font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .row.fr .teams { color: #c8d8ff; }
  .sep         { color: var(--muted); }
  .group       { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .venue       { font-size: 11px; color: var(--muted); font-style: italic; opacity: .7; }

  .teams .fi { font-size: 1.1em; vertical-align: -0.1em; border-radius: 2px; }

  /* Channel badges */
  .badge      { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .badge-m6   { background: var(--m6-bg); color: var(--m6-tx); }
  .badge-fin  { background: rgba(240,192,64,.15); color: var(--gold); }

  .score-mid { font-size: 13px; font-weight: 700; color: var(--text); background: rgba(255,255,255,0.09); padding: 1px 7px; border-radius: 4px; }

  /* ── Classements ── */
  .standings-label {
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  #standings { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }

  .gtable { background: var(--bg); border: 1px solid var(--bd); border-radius: var(--r); overflow: hidden; }
  .gtable-head {
    padding: 5px 8px;
    font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
    color: var(--accent); border-bottom: 1px solid var(--bd);
    background: rgba(74,222,128,0.06);
  }
  .gtable table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
  .gtable th { color: var(--muted); font-weight: 600; padding: 3px 4px; text-align: right; font-size: 10px; }
  .gtable th:first-child { text-align: left; padding-left: 7px; width: 43%; }
  .gtable td { padding: 4px 4px; text-align: right; border-top: 1px solid var(--bd); }
  .gtable td:first-child { text-align: left; padding-left: 7px; overflow: hidden; }
  /* Top 2 qualifiés automatiquement */
  .gtable tr.st-q1   { background: rgba(251,191,36,0.13); }
  .gtable tr.st-q1   td { border-top-color: rgba(251,191,36,0.25); }
  /* 3e qualifié parmi les meilleurs 3es */
  .gtable tr.st-q3ok { background: rgba(205,120,50,0.10); }
  .gtable tr.st-q3ok td { border-top-color: rgba(205,120,50,0.22); }
  .gt-q-dot3 { width: 5px; height: 5px; border-radius: 50%; background: #cd7832; flex-shrink: 0; opacity: .8; }
  /* Groupe France */
  .gtable.fr-group { border-color: rgba(0,35,149,0.50); }
  .gtable.fr-group .gtable-head { color: #7ba7ff; background: rgba(0,35,149,0.18); border-bottom-color: rgba(0,35,149,0.35); }
  .gtable.fr-group td { border-top-color: rgba(0,35,149,0.20); }
  .gtable.fr-group th { color: #4d6a9a; }
  .gt-team { display: flex; align-items: center; gap: 4px; min-width: 0; }
  .gt-team .gt-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; }
  .gt-team .fi { font-size: .9em; border-radius: 2px; flex-shrink: 0; }
  .gt-pts { font-weight: 700; color: var(--text); }
  .gt-gd-pos { color: #4ade80; }
  .gt-gd-neg { color: var(--lv-c); }
  .gt-q-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; opacity: .8; }

  .empty  { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }

  footer {
    flex-shrink: 0;
    text-align: center;
    padding: 10px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--bd);
  }

  /* ── Lien tableau de bord ── */
  .bracket-link {
    display: flex; align-items: center; gap: 7px;
    margin: 12px 10px 4px;
    padding: 8px 12px;
    border: 1px solid var(--bd2);
    border-radius: var(--r);
    font-size: 12px; font-weight: 600; color: var(--muted);
    text-decoration: none;
    background: var(--bg);
    transition: border-color .15s, color .15s, background .15s;
  }
  .bracket-link:hover { border-color: var(--accent); color: var(--accent); background: var(--surf2); }
</style>
</head>

</div>

function teamHtml(name) {
  const code = FLAG[name];
  const flag = code ? `<span class="fi fi-${code}"></span>` : '';
  return `${flag}<span class="gt-name">${name}</span>`;
}

function matchHtml(str, score) {
  const [a, b] = str.split(' - ');
  if (!b) return str;
  const sep = score
    ? `<span class="sep score-mid">${score}</span>`
    : `<span class="sep">-</span>`;
  return `${teamHtml(a)} ${sep} ${teamHtml(b)}`;
}

// ── Constantes locales ─────────────────────────────────────────────────────
const KO_PHASES  = ['16e','8e','Quart','Demi','Petite','Finale'];

// ── State ──────────────────────────────────────────────────────────────────
let scoreMap         = {};
let lastStandingsSig = '';

// ── ESPN ───────────────────────────────────────────────────────────────────
async function fetchScores() {
  const data = await fetchEspnData();
  if (!data) return false;
  try {
    const newMap = {};
    (data.events || []).forEach(ev => {
      const comp = ev.competitions?.[0];
      if (!comp) return;
      const sn   = comp.status?.type?.name || '';
      const isLv = sn === 'STATUS_IN_PROGRESS';
      const isHT = sn === 'STATUS_HALFTIME';
      const isFT = sn === 'STATUS_FULL_TIME' || sn === 'STATUS_FINAL';
      const home = comp.competitors?.find(c => c.homeAway === 'home');
      const away = comp.competitors?.find(c => c.homeAway === 'away');
      newMap[ev.id] = {
        hs:    home?.score ?? null,
        as:    away?.score ?? null,
        st:    isLv ? 'live' : isHT ? 'ht' : isFT ? 'ft' : 'sched',
        min:   isHT ? 'MT' : (comp.status?.displayClock || ''),
        hname: TEAM_EN_FR[home?.team?.displayName] || home?.team?.shortDisplayName,
        aname: TEAM_EN_FR[away?.team?.displayName] || away?.team?.shortDisplayName,
        venue: comp.venue?.fullName || '',
      };
    });
    scoreMap = newMap;
    MATCHES.forEach(m => {
      if (m.ph !== 'ko') return;
      const s = scoreMap[m.espnId];
      if (!s || !s.hname || !s.aname) return;
      m.m = `${s.hname} - ${s.aname}`;
    });
    return true;
  } catch { return false; }
}

// ── Classements ────────────────────────────────────────────────────────────
function computeStandings() {
  const groups = {};
  MATCHES.forEach(m => {
    if (m.ph === 'ko') return;
    const parts = m.m.split(' - ');
    if (parts.length < 2) return;
    const [ta, tb] = parts;
    if (!groups[m.g]) groups[m.g] = {};
    const g = groups[m.g];
    if (!g[ta]) g[ta] = { w:0, d:0, l:0, gf:0, ga:0, played:0 };
    if (!g[tb]) g[tb] = { w:0, d:0, l:0, gf:0, ga:0, played:0 };
    const s = scoreMap[m.espnId];
    if (!s || s.st !== 'ft' || s.hs === null) return;
    const hs = +s.hs, as = +s.as;
    g[ta].played++; g[tb].played++;
    g[ta].gf += hs;  g[ta].ga += as;
    g[tb].gf += as;  g[tb].ga += hs;
    if      (hs > as) { g[ta].w++; g[tb].l++; }
    else if (as > hs) { g[tb].w++; g[ta].l++; }
    else              { g[ta].d++; g[tb].d++; }
  });
  return groups;
}

function renderStandings() {
  const sig = JSON.stringify(scoreMap);
  if (sig === lastStandingsSig) return;
  lastStandingsSig = sig;
  const container = document.getElementById('standings');
  const groups = computeStandings();
  const seen = new Set();
  const groupOrder = [];
  MATCHES.forEach(m => { if (!m.ph && !seen.has(m.g)) { seen.add(m.g); groupOrder.push(m.g); } });
  let html = '';
  const sortFn = (a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.name.localeCompare(b.name);
  const rowsByGroup = {};
  groupOrder.forEach(gname => {
    const teams = groups[gname] || {};
    rowsByGroup[gname] = Object.entries(teams)
      .map(([name, s]) => ({
        name, played: s.played, w: s.w, d: s.d, l: s.l,
        gf: s.gf, ga: s.ga, gd: s.gf - s.ga, pts: s.w * 3 + s.d,
      }))
      .sort(sortFn);
  });
  const thirds = [];
  groupOrder.forEach(gname => {
    const rows = rowsByGroup[gname];
    if (rows.length >= 3) thirds.push({ ...rows[2], group: gname });
  });
  thirds.sort(sortFn);
  const qualifiedThirds = new Set(thirds.slice(0, 8).map(t => t.name));
  const anyResults = thirds.some(t => t.played > 0);

  groupOrder.forEach(gname => {
    const rows = rowsByGroup[gname];
    const isFrGroup = gname === 'Groupe I';
    html += `<div class="gtable${isFrGroup ? ' fr-group' : ''}"><div class="gtable-head">${gname}</div>
      <table><thead><tr>
        <th>Équipe</th><th title="Joués">J</th><th title="Victoires">V</th>
        <th title="Nuls">N</th><th title="Défaites">D</th>
        <th title="Différence de buts">+/-</th><th title="Points">Pts</th>
      </tr></thead><tbody>`;
    rows.forEach((r, i) => {
      const is3rd  = i === 2;
      const is3rdQ = is3rd && anyResults && qualifiedThirds.has(r.name);
      const cls    = i < 2 ? 'st-q1' : is3rdQ ? 'st-q3ok' : '';
      const gdVal  = r.gd > 0 ? `<span class="gt-gd-pos">+${r.gd}</span>`
                   : r.gd < 0 ? `<span class="gt-gd-neg">${r.gd}</span>`
                   : '0';
      const qdot   = i < 2 ? '<span class="gt-q-dot"></span>'
                   : is3rdQ ? '<span class="gt-q-dot3"></span>' : '';
      html += `<tr class="${cls}"><td><div class="gt-team">${qdot}${teamHtml(r.name)}</div></td>
        <td>${r.played}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
        <td>${gdVal}</td><td class="gt-pts">${r.pts}</td></tr>`;
    });
    html += `</tbody></table></div>`;
  });
  container.innerHTML = html || '<p class="empty">Aucune donnée disponible.</p>';
}

// ── Logique temporelle ─────────────────────────────────────────────────────
function matchState(m) {
  const s = scoreMap[m.espnId];
  if (s && s.st !== 'sched') return s.st;
  const now     = Date.now();
  const ko      = new Date(m.utc).getTime();
  const dur     = m.ph === 'ko' ? DUR_KO : DUR_GROUP;
  const elapsed = now - ko;
  if (elapsed >= 0 && elapsed < dur) return elapsed >= 46*60000 && elapsed < 62*60000 ? 'ht' : 'live';
  if (elapsed >= dur)                return 'ft';
  return 'sched';
}

function liveLabel(m) {
  const s = scoreMap[m.espnId];
  if (s && (s.st === 'live' || s.st === 'ht')) {
    if (s.st === 'ht') return 'Mi-temps';
    if (s.min) return s.min;
  }
  const elapsed = Math.floor((Date.now() - new Date(m.utc).getTime()) / 60000);
  if (elapsed >= 46 && elapsed < 62) return 'Mi-temps';
  return elapsed < 46 ? '1ère mi-temps' : '2ème mi-temps';
}

function scoreLabel(m) {
  const s = scoreMap[m.espnId];
  if (!s || s.hs === null) return '';
  if (s.st === 'ft' || s.st === 'live' || s.st === 'ht') return `${s.hs}-${s.as}`;
  return '';
}

function nextMatchUtc() {
  const now = Date.now();
  const future = MATCHES
    .filter(x => new Date(x.utc).getTime() > now)
    .sort((a, b) => new Date(a.utc) - new Date(b.utc));
  return future.length ? future[0].utc : null;
}

// ── Rendu ──────────────────────────────────────────────────────────────────
function rowClass(st, m, next) {
  if (st === 'live' || st === 'ht') return 'row lv';
  if (m.fr)           return 'row fr';
  if (m.utc === next) return 'row nx';
  if (m.final)        return 'row fn';
  return 'row';
}

function timeCell(st, m, next) {
  const isLive = st === 'live' || st === 'ht';
  const isNext = !isLive && m.utc === next;
  const label  = isLive ? liveLabel(m) : '';
  const sub = isLive
    ? `<span class="badge-live">⬤${label ? ' ' + label : ''}</span>`
    : isNext ? `<span class="badge-next">▶ SUIVANT</span>` : '';
  return `<div class="time-col"><span class="time">${timeLabel(m.utc)}</span>${sub}</div>`;
}

function channelBadge(m) {
  if (m.final)       return '<span class="badge badge-fin">M6 — FINALE</span>';
  if (m.tv === 'm6') return '<span class="badge badge-m6">M6</span>';
  return '';
}

function render() {
  const cal  = document.getElementById('cal');
  const next = nextMatchUtc();
  if (!MATCHES.length) { cal.innerHTML = '<p class="empty">Aucun match.</p>'; return; }

  let html = '', lastDay = '', lastPhase = '';
  MATCHES.forEach(x => {
    const day   = dayLabel(x.utc);
    const phase = x.ph === 'ko' ? (KO_PHASES.find(p => x.g.startsWith(p)) || x.g) : '';

    if (day !== lastDay || (phase && phase !== lastPhase)) {
      if (lastDay) html += '</div>';
      if (phase && phase !== lastPhase) {
        html += `<div class="phase-title">${x.g}</div>`;
        lastPhase = phase;
      }
      html += `<div class="day-group"><div class="day-label">${day}</div>`;
      lastDay = day;
    }

    const st    = matchState(x);
    const score = scoreLabel(x);
    html += `<div class="${rowClass(st, x, next)}" data-utc="${x.utc}">
      ${timeCell(st, x, next)}
      <div class="match-info">
        <div class="teams">${matchHtml(x.m, score)}</div>
        <div class="group">${x.g}</div>
        ${scoreMap[x.espnId]?.venue ? `<div class="venue">${scoreMap[x.espnId].venue}</div>` : ''}
      </div>
      ${channelBadge(x)}
    </div>`;
  });
  if (lastDay) html += '</div>';

  cal.innerHTML = html;
  updateStatusBar(next);
}

// ── Focus card ─────────────────────────────────────────────────────────────
function updateStatusBar(next) {
  const hm     = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  const card   = document.getElementById('fcard');
  const dateEl = document.getElementById('fcard-date');
  const live   = MATCHES.filter(x => matchState(x) === 'live' || matchState(x) === 'ht');
  const focus  = live[0] || MATCHES.find(x => x.utc === next);

  document.getElementById('stime-wrap').textContent = hm;

  if (!focus) {
    card.style.display = 'none';
    dateEl.style.display = 'none';
    return;
  }

  dateEl.textContent = new Date(focus.utc).toLocaleDateString('fr-FR', {
    weekday: 'long', day: 'numeric', month: 'long', timeZone: 'Europe/Paris'
  });
  dateEl.style.display = 'block';

  const isLive  = live.length > 0;
  const s       = scoreMap[focus.espnId];

  let statusHtml, timerHtml, fcScore = '';
  if (isLive) {
    const count = live.length;
    statusHtml = `⬤ ${count > 1 ? count + ' en cours' : 'En cours'}`;
    if (s && s.hs !== null) fcScore = `${s.hs}-${s.as}`;
    timerHtml = s?.min || (s?.st === 'ht' ? 'Mi-temps' : '');
  } else {
    statusHtml = '▶ Prochain';
    timerHtml = timeLabel(focus.utc);
  }

  card.className = isLive ? 'is-live' + (focus.fr ? ' is-fr' : '') : (focus.fr ? 'is-fr' : '');
  card.style.display = 'flex';
  card.innerHTML = `
    <div class="fc-left">
      <span class="fc-status">${statusHtml}</span>
      <span class="fc-timer">${timerHtml}</span>
    </div>
    <div class="fc-teams">${matchHtml(focus.m, fcScore)}</div>
  `;
}

// ── Jump vers le match actif ───────────────────────────────────────────────
function jumpToActive() {
  const next   = nextMatchUtc();
  const target = MATCHES.find(x => { const s = matchState(x); return s === 'live' || s === 'ht'; })
               || MATCHES.find(x => x.utc === next);
  if (!target) return;

  if (!document.querySelector(`[data-utc="${target.utc}"]`)) render();

  setTimeout(() => {
    const el  = document.querySelector(`[data-utc="${target.utc}"]`);
    const col = document.querySelector('.matches-body');
    if (el && col) {
      const elTop  = el.getBoundingClientRect().top;
      const colTop = col.getBoundingClientRect().top;
      col.scrollTop += elTop - colTop - col.clientHeight / 2 + el.clientHeight / 2;
    }
  }, 50);
}

// ── Position France en phase de groupes ───────────────────────────────────
function computeFrancePos() {
  const groups = computeStandings();
  const g = groups['Groupe I'];
  if (!g) return null;
  const rows = Object.entries(g)
    .map(([name, s]) => ({ name, played: s.played, pts: s.w*3+s.d, gd: s.gf-s.ga, gf: s.gf }))
    .sort((a, b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.name.localeCompare(b.name));
  const allDone = rows.every(r => r.played === 3);
  if (!allDone) return null;
  const idx = rows.findIndex(r => r.name === 'France');
  return idx >= 0 ? `${idx+1}I` : null;
}

function updateFranceKoFlags() {
  const pos = computeFrancePos();
  try { localStorage.setItem('cdm_fr_pos', pos || ''); } catch {}
  MATCHES.forEach(m => {
    if (!m.frIf) return;
    if (pos) {
      m.fr = m.frIf.includes(pos) ? 1 : 0;
    } else {
      // Position pas encore confirmée : tous les parcours possibles de la France
      m.fr = m.frIf.some(f => f === '1I' || f === '2I') ? 1 : 0;
    }
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
async function refresh() {
  await fetchScores();
  updateFranceKoFlags();
  render();
  renderStandings();
  const hasLive = MATCHES.some(x => { const st = matchState(x); return st === 'live' || st === 'ht'; });
  setTimeout(refresh, hasLive ? 30000 : 120000);
}

render();
renderStandings();
refresh();
